<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helpdesk Support System</title>
    <link rel="icon" href="logo.png" />
    <style>
      :root {
        --bg: radial-gradient(circle at top left, #fbded1, transparent 55%),
          radial-gradient(circle at 20% 80%, #d4f4ff, transparent 50%),
          #f2f4f8;
        --panel: #ffffff;
        --text: #0f172a;
        --muted: #5b6476;
        --primary: #0a7c6b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Work Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .start {
        width: min(560px, calc(100% - 32px));
        background: var(--panel);
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
        padding: 28px;
        text-align: center;
      }

      .start img {
        width: 92px;
        height: 92px;
        border-radius: 24px;
        object-fit: cover;
        border: 2px solid #0f172a;
      }

      .start h1 {
        margin: 14px 0 8px;
        font-size: 30px;
      }

      .start p {
        margin: 0 0 22px;
        color: var(--muted);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 180px;
        padding: 12px 18px;
        border-radius: 999px;
        background: var(--primary);
        border: 1px solid var(--primary);
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="start">
      <img src="logo.png" alt="Logo" />
      <h1>Helpdesk O.S.</h1>
      <p>Painel de atendimento, vendas e financeiro.</p>
      <a class="btn" href="dashboard.html">Entrar no sistema</a>
    </main>
  </body>
</html>
